# SysTest 配置文件

test:
  # 默认测试设备
  device: /dev/ufs0
  # 结果输出目录
  output_dir: ./results
  # 日志目录
  log_dir: ./logs
  # 测试模式（development/production）
  mode: development

fio:
  # 默认运行时间（秒）
  default_runtime: 60
  # Sustained 测试运行时间
  sustained_runtime: 300
  # Burst 测试运行时间
  burst_runtime: 60
  # 默认队列深度
  iodepth: 32
  # 默认线程数
  numjobs: 1

validation:
  # 容差（5%）
  tolerance: 0.05
  # 寿命衰减阈值（1%）
  lifespan_degradation_threshold: 1.0
  # 温度阈值（70℃）
  temperature_threshold: 70
  # 温升阈值（20℃）
  temperature_rise_threshold: 20

postcondition:
  # 坏块增加 = FAIL（最高优先级）
  bad_blocks_critical: true
  # 寿命衰减阈值
  lifespan_threshold: 1.0
  # 错误计数增加 = FAIL
  error_counts_critical: true

hardware:
  # 智驾板地址（示例）
  # zhijia_board: root@zhijia-board
  # 部署路径
  deploy_path: /opt/systest
