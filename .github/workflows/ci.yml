name: UFS Auto CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort
          pip install -r requirements.txt

      - name: Python code formatting check
        run: |
          echo "=== Checking black formatting ==="
          black --check systest/ --target-version py310
          echo "=== Checking isort imports ==="
          isort --check systest/

      - name: Python linting
        continue-on-error: true
        run: |
          echo "=== Running flake8 ==="
          flake8 systest/ --max-line-length=120 --ignore=F401,F541,E501,F841,W293 || true
          echo "=== Running pylint (non-blocking) ==="
          # pylint 只输出不阻塞 CI
          pylint systest/ --disable=C0114,C0115,C0116,R0801,W0613 || true

      # - name: Bash script linting
      #   uses: ludeeus/action-shellcheck@master
      #   with:
      #     scandir: './scripts'
      # 暂时禁用：scripts 目录不存在

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FIO
        run: |
          echo "=== Installing FIO ==="
          sudo apt-get update
          sudo apt-get install -y fio
          fio --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install coverage
        run: pip install coverage pytest-cov

      - name: Run unit tests with coverage
        run: |
          echo "=== Running pytest with coverage ==="
          cd systest
          python -m pytest tests/ -v --tb=short --cov=systest --cov-report=term-missing --cov-report=html
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: systest/htmlcov/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          # 忽略内部测试工具的安全警告
          # B307: eval() 用于阈值计算
          # B306: mktemp() 用于临时文件
          # B602: shell=True 用于内部命令
          bandit -r systest/ -s B307,B306,B602 -ll -ii

  arm64-container-test:
    name: ARM64 Container Test (Debian 12)
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run tests in ARM64 Debian 12 container
        uses: addnab/docker-run-action@v3
        with:
          # 使用官方多架构镜像，通过 QEMU 模拟 ARM64
          image: debian:12
          options: --platform linux/arm64 -v ${{ github.workspace }}:/workspace
          run: |
            set -e
            echo "=== ARM64 容器测试 ==="
            echo "架构：$(uname -m)"
            echo "系统：$(cat /etc/debian_version)"
            
            # 安装依赖
            apt-get update
            apt-get install -y python3 python3-pip fio
            
            # 安装 Python 依赖
            cd /workspace/systest
            ls -la
            # 尝试多个可能的文件名
            if [ -f requirements.txt ]; then
              pip3 install --break-system-packages -r requirements.txt
            elif [ -f requirements-ci.txt ]; then
              pip3 install --break-system-packages -r requirements-ci.txt
            else
              echo "❌ requirements 文件不存在"
              exit 1
            fi
            
            # 运行测试
            echo "=== 运行 pytest ==="
            python3 -m pytest tests/ -v --tb=short
            
            # 验证 FIO
            echo "=== 验证 FIO ==="
            fio --version

  build-test-package:
    name: Build Test Package
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build test package
        run: |
          mkdir -p build/ufs_test_package
          cp -r systest/ build/ufs_test_package/
          cp -r docs/ build/ufs_test_package/
          cp README.md build/ufs_test_package/ 2>/dev/null || true
          cp requirements.txt build/ufs_test_package/
          # scripts 目录可选，不存在时跳过
          [ -d scripts ] && cp -r scripts/ build/ufs_test_package/ || true
          tar zcf build/ufs_test_package.tar.gz -C build/ ufs_test_package

      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: ufs_test_package
          path: build/ufs_test_package.tar.gz

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan, build-test-package]
    if: always()
    steps:
      - name: Send notification
        uses: actions/github-script@v6
        with:
          script: |
            const result = '${{ needs.code-quality.result }}' === 'success' && '${{ needs.unit-test.result }}' === 'success' && '${{ needs.security-scan.result }}' === 'success' && '${{ needs.build-test-package.result }}' === 'success';
            const status = result ? '✅ CI 执行成功' : '❌ CI 执行失败';
            console.log(status);
