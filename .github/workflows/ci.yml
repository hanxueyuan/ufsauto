name: UFS Auto CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort

      - name: Python code formatting check
        run: |
          black --check src/ tests/
          isort --check src/ tests/

      - name: Python linting
        run: |
          flake8 src/ tests/ --max-line-length=120
          pylint src/ tests/ --disable=C0114,C0115,C0116 --fail-under=8.0

      - name: Bash script linting
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python security scan
        uses: PyCQA/bandit-action@v1
        with:
          path: src/
          level: high
          confidence: medium

      - name: Secret scanning
        uses: secret-scanning/action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          folder-path: 'docs/'

  build-test-package:
    name: Build Test Package
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan, documentation-check]
    steps:
      - uses: actions/checkout@v3

      - name: Build test package
        run: |
          mkdir -p build/ufs_test_package
          cp -r src/ build/ufs_test_package/
          cp -r scripts/ build/ufs_test_package/
          cp -r docs/ build/ufs_test_package/
          cp README.md build/ufs_test_package/
          cp requirements.txt build/ufs_test_package/
          tar zcf build/ufs_test_package.tar.gz -C build/ ufs_test_package

      - name: Upload test package
        uses: actions/upload-artifact@v3
        with:
          name: ufs_test_package
          path: build/ufs_test_package.tar.gz

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan, documentation-check, build-test-package]
    if: always()
    steps:
      - name: Send notification
        uses: actions/github-script@v6
        with:
          script: |
            const result = ${{ needs.code-quality.result == 'success' && needs.unit-test.result == 'success' && needs.security-scan.result == 'success' && needs.documentation-check.result == 'success' && needs.build-test-package.result == 'success' }};
            const status = result ? '✅ CI 执行成功' : '❌ CI 执行失败';
            console.log(status);
            // 这里可以配置飞书通知webhook
