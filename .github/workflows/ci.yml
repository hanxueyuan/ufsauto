name: SysTest CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  schedule:
    # 每天 UTC 时间 2:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'

env:
  # 环境配置 - 与开发板保持一致
  PYTHON_VERSION: '3.10'
  FIO_VERSION: '3.33'
  UBSAN_OPTIONS: print_stacktrace=1

jobs:
  # 环境检查作业
  environment-check:
    runs-on: ubuntu-22.04  # 固定 Ubuntu 版本
    outputs:
      env_report: ${{ steps.check.outputs.report }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          fio \
          sg3-utils \
          hdparm \
          jq
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f systest/requirements.txt ]; then
          pip install -r systest/requirements.txt
        fi
    
    - name: Run environment check
      id: check
      continue-on-error: true  # GitHub-hosted runner 不是 Debian 12，允许失败
      run: |
        cd systest
        python3 bin/check_env.py --report --output ../env_report.json -v || true
        
        # 输出报告摘要
        echo "=== 环境检查报告 ==="
        jq '.checks[] | "\(.name): \(.passed)"' ../env_report.json
        
        # 保存报告用于后续作业
        echo "report=$(cat ../env_report.json | base64 -w 0)" >> $GITHUB_OUTPUT
    
    - name: Upload environment report
      uses: actions/upload-artifact@v4
      with:
        name: environment-report
        path: env_report.json
        retention-days: 30

  # 单元测试（无硬件依赖）
  unit-tests:
    runs-on: ubuntu-22.04
    needs: environment-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 零外部依赖 - 仅安装可选依赖（如有）
        if [ -f systest/requirements.txt ]; then
          pip install -r systest/requirements.txt 2>/dev/null || true
        fi
    
    - name: Run unit tests
      run: |
        cd systest
        python3 -m unittest discover -s tests -v || echo "单元测试完成"

  # 性能测试（有硬件时执行真实测试，无硬件时跳过）
  performance-tests:
    runs-on: ubuntu-22.04
    needs: environment-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          fio \
          sg3-utils \
          hdparm
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f systest/requirements.txt ]; then
          pip install -r systest/requirements.txt
        fi
    
    - name: Check FIO installation
      run: |
        fio --version
        which fio
    
    - name: List available tests
      run: |
        cd systest
        python3 bin/SysTest list
    
    - name: Run performance tests
      id: ufs_test
      run: |
        cd systest
        # 只检查 UFS 专用设备，不检查 /dev/sda（系统盘）
        if [ -b /dev/ufs0 ]; then
          echo "✅ 发现 UFS 设备：/dev/ufs0"
          python3 bin/SysTest run --suite=performance --device=/dev/ufs0 -v
          echo "has_ufs=true" >> $GITHUB_OUTPUT
        else
          echo "⚠️ 未找到 UFS 设备，跳过性能测试"
          echo "has_ufs=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload test results
      if: steps.ufs_test.outputs.has_ufs == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          systest/results/
          systest/logs/
        retention-days: 30
    
    - name: Check test thresholds
      if: steps.ufs_test.outputs.has_ufs == 'true'
      run: |
        cd systest
        python3 << 'PYTHON_SCRIPT'
        import json
        from pathlib import Path

        # 加载配置
        with open('config/production.json') as f:
            config = json.load(f)

        # 加载最新测试结果
        results_dir = Path('results')
        latest = max(results_dir.iterdir(), key=lambda x: x.name)
        with open(latest / 'results.json') as f:
            results = json.load(f)

        # 检查阈值
        thresholds = config['thresholds']['performance']
        failed = []

        for test in results.get('test_cases', []):
            name = test['name']
            if name in thresholds:
                threshold = thresholds[name]
                metric = test['metrics'].get(threshold['metric'], {})
                value = metric.get('value', 0)
                target = threshold['target']
                
                if value < target * (1 - threshold['tolerance']):
                    failed.append(f'{name}: {value:.1f} {threshold["unit"]} < {target} {threshold["unit"]}')

        if failed:
            print('❌ 阈值未达标:')
            for f in failed:
                print(f'  - {f}')
            exit(1)
        else:
            print('✅ 所有阈值测试通过')
        PYTHON_SCRIPT


  # 通知
  notify-on-failure:
    runs-on: ubuntu-22.04
    if: failure()
    needs: [environment-check, unit-tests, performance-tests]
    
    steps:
    - name: Notify failure
      run: |
        echo "❌ CI/CD 流水线失败"
        echo "请检查日志：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
