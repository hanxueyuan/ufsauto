# GitHub Actions CI/CD 配置
# 每次提交自动执行代码检查和测试验证

name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ============================================
  # 工作 1: 代码检查
  # ============================================
  
  syntax-check:
    name: Python 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Syntax Check
        run: |
          echo "=== Python 语法检查 ==="
          python3 -m py_compile systest/bin/SysTest
          python3 -m py_compile systest/bin/check_env.py
          python3 -m py_compile systest/core/runner.py
          python3 -m py_compile systest/core/collector.py
          python3 -m py_compile systest/core/reporter.py
          python3 -m py_compile systest/core/logger.py
          python3 -m py_compile systest/tools/fio_wrapper.py
          python3 -m py_compile systest/tools/ufs_utils.py
          for file in systest/suites/performance/*.py; do
            python3 -m py_compile "$file"
          done
          echo "✅ 语法检查通过"

  type-check:
    name: 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install mypy
        run: pip install mypy
      
      - name: Type Check
        run: |
          echo "=== 类型检查 ==="
          mypy systest/ --ignore-missing-imports || true
          echo "✅ 类型检查完成"
    continue-on-error: true  # 类型检查不阻塞流程

  lint-check:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install pycodestyle
        run: pip install pycodestyle
      
      - name: Lint Check
        run: |
          echo "=== 代码规范检查 ==="
          pycodestyle systest/bin/ systest/core/ systest/tools/ systest/suites/ \
            --max-line-length=120 --ignore=E501,W503 || true
          echo "✅ 代码规范检查完成"
    continue-on-error: true  # 规范检查不阻塞流程

  # ============================================
  # 工作 2: 功能测试
  # ============================================
  
  dry-run-test:
    name: Dry-run 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Dry-run Test
        run: |
          echo "=== Dry-run 测试 ==="
          cd systest
          python3 bin/SysTest run --suite=performance --dry-run
          python3 bin/SysTest run --suite=performance --dry-run --quick
          echo "✅ Dry-run 测试通过"

  env-check:
    name: 环境检测测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Environment Check
        run: |
          echo "=== 环境检测测试 ==="
          cd systest
          python3 bin/SysTest check-env
          echo "✅ 环境检测通过"

  help-test:
    name: 帮助文档测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Help Test
        run: |
          echo "=== 帮助文档测试 ==="
          cd systest
          python3 bin/SysTest --help
          python3 bin/SysTest run --help
          python3 bin/SysTest check-env --help
          python3 bin/SysTest list --help
          python3 bin/SysTest report --help
          echo "✅ 帮助文档测试通过"

  # ============================================
  # 工作 3: 项目清理检查
  # ============================================
  
  cleanup-check:
    name: 项目瘦身检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cleanup Check
        run: |
          echo "=== 项目瘦身检查 ==="
          echo "检查是否有不必要的文件..."
          test ! -d ".git/__pycache__" || (echo "❌ 发现__pycache__" && exit 1)
          test ! -d "systest/__pycache__" || (echo "❌ 发现__pycache__" && exit 1)
          test ! -d "venv" || (echo "❌ 发现 venv" && exit 1)
          test ! -d "results" || (echo "❌ 发现 results" && exit 1)
          echo "✅ 项目瘦身检查通过"
    continue-on-error: true
