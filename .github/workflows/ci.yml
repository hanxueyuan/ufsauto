name: UFS Auto CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort
          pip install -r requirements.txt

      - name: Python code formatting check
        run: |
          echo "=== Checking black formatting ==="
          black --check systest/ --target-version py310
          echo "=== Checking isort imports ==="
          isort --check systest/

      - name: Python linting
        continue-on-error: true
        run: |
          echo "=== Running flake8 ==="
          flake8 systest/ --max-line-length=120 --ignore=F401,F541,E501,F841,W293 || true
          echo "=== Running pylint (non-blocking) ==="
          # pylint 只输出不阻塞 CI
          pylint systest/ --disable=C0114,C0115,C0116,R0801,W0613 || true

      # - name: Bash script linting
      #   uses: ludeeus/action-shellcheck@master
      #   with:
      #     scandir: './scripts'
      # 暂时禁用：scripts 目录不存在

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          echo "=== Running pytest ==="
          cd systest
          # 只运行不依赖外部工具的测试
          # quick_fio_test 需要 FIO 工具，在 CI 中不可用
          python -m pytest tests/test_precondition.py -v --tb=short

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          # 忽略内部测试工具的安全警告
          # B307: eval() 用于阈值计算
          # B306: mktemp() 用于临时文件
          # B602: shell=True 用于内部命令
          bandit -r systest/ -s B307,B306,B602 -ll -ii

  build-test-package:
    name: Build Test Package
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan]
    steps:
      - uses: actions/checkout@v3

      - name: Build test package
        run: |
          mkdir -p build/ufs_test_package
          cp -r systest/ build/ufs_test_package/
          cp -r scripts/ build/ufs_test_package/
          cp -r docs/ build/ufs_test_package/
          cp README.md build/ufs_test_package/
          cp requirements.txt build/ufs_test_package/
          tar zcf build/ufs_test_package.tar.gz -C build/ ufs_test_package

      - name: Upload test package
        uses: actions/upload-artifact@v3
        with:
          name: ufs_test_package
          path: build/ufs_test_package.tar.gz

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [code-quality, unit-test, security-scan, build-test-package]
    if: always()
    steps:
      - name: Send notification
        uses: actions/github-script@v6
        with:
          script: |
            const result = '${{ needs.code-quality.result }}' === 'success' && '${{ needs.unit-test.result }}' === 'success' && '${{ needs.security-scan.result }}' === 'success' && '${{ needs.build-test-package.result }}' === 'success';
            const status = result ? '✅ CI 执行成功' : '❌ CI 执行失败';
            console.log(status);
