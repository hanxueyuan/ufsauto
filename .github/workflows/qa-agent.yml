# QA Agent Workflow
# 负责查看 CI/CD 结果并生成报告

name: QA Agent

on:
  workflow_run:
    workflows: ["SysTest CI/CD"]
    types:
      - completed

env:
  REPORT_CHANNEL: "feishu"  # 汇报渠道

jobs:
  qa-review:
    name: QA Review
    runs-on: ubuntu-latest
    
    steps:
      - name: 下载 CI/CD 报告
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: systest-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: qa-report
          path: qa-report/
      
      - name: 读取 CI/CD 结果
        id: result
        run: |
          if [ -f qa-report/ci-cd-result.md ]; then
            echo "找到 CI/CD 报告"
            cat qa-report/ci-cd-result.md
            
            # 提取总体状态
            if grep -q "✅ 所有检查通过" qa-report/ci-cd-result.md; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 未找到 CI/CD 报告"
            echo "status=error" >> $GITHUB_OUTPUT
          fi
      
      - name: 生成 QA 摘要
        id: summary
        run: |
          cat > qa-report/qa-summary.md << EOF
          # QA Agent 摘要报告
          
          **CI/CD 执行时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **QA 审查时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **CI/CD 状态**: ${{ steps.result.outputs.status }}
          
          ## 快速查看
          
          EOF
          
          if [[ "${{ steps.result.outputs.status }}" == "success" ]]; then
            echo "✅ **所有检查通过**" >> qa-report/qa-summary.md
            echo "" >> qa-report/qa-summary.md
            echo "CI/CD 流程执行成功，代码质量、测试配置、文档完整性均符合要求。" >> qa-report/qa-summary.md
          else
            echo "❌ **部分检查失败**" >> qa-report/qa-summary.md
            echo "" >> qa-report/qa-summary.md
            echo "⚠️ 请查看详细信息，定位失败原因。" >> qa-report/qa-summary.md
          fi
          
          cat >> qa-report/qa-summary.md << EOF
          
          ## 详细信息
          
          - [查看完整 CI/CD 报告](${{ github.event.workflow_run.html_url }})
          - [查看代码变更](${{ github.event.workflow_run.repository.html_url }}/compare/${{ github.event.workflow_run.head_sha }})
          
          ## 下一步行动
          
          EOF
          
          if [[ "${{ steps.result.outputs.status }}" == "success" ]]; then
            echo "- ✅ 代码可以合并" >> qa-report/qa-summary.md
            echo "- ✅ 可以继续部署" >> qa-report/qa-summary.md
          else
            echo "- ❌ 需要修复失败的检查项" >> qa-report/qa-summary.md
            echo "- ❌ 重新运行 CI/CD" >> qa-report/qa-summary.md
          fi
      
      - name: 上传 QA 摘要
        uses: actions/upload-artifact@v4
        with:
          name: qa-summary
          path: qa-report/
          retention-days: 90
      
      - name: 发送汇报通知
        run: |
          echo "=== QA Agent 汇报 ==="
          echo ""
          echo "CI/CD 状态：${{ steps.result.outputs.status }}"
          echo ""
          
          if [[ "${{ steps.result.outputs.status }}" == "success" ]]; then
            echo "✅ 所有检查通过！"
            echo ""
            echo "详细信息：${{ github.event.workflow_run.html_url }}"
          else
            echo "❌ 部分检查失败"
            echo ""
            echo "请查看完整报告：${{ github.event.workflow_run.html_url }}"
          fi
          
          echo ""
          echo "=== 汇报完成 ==="
