# UFS 3.1 测试配置文件

# 设备配置
device:
  path: "/dev/ufs0"
  block_size: 4096
  timeout: 30

# 功能测试配置
functional_test:
  enabled: true
  max_test_blocks: 100000
  random_iterations: 1000
  command_test_all_opcodes: true

# 性能测试配置
performance_test:
  enabled: true
  sequential_test_size_gb: 1
  random_test_operations: 10000
  latency_test_iterations: 1000
  queue_depths: [1, 8, 32, 128, 256]
  block_sizes_kb: [4, 16, 64, 256, 1024]
  # 性能阈值
  thresholds:
    seq_read_mbs: 2100
    seq_write_mbs: 1600
    rand_read_iops: 400000
    rand_write_iops: 350000
    avg_read_latency_us: 100
    avg_write_latency_us: 200

# 可靠性测试配置
reliability_test:
  enabled: true
  power_cycle_cycles: 1000
  data_retention_hours: 1000
  temperature_cycles: 1000
  vibration_test_duration_hours: 100
  shock_test_count: 1000
  # 可靠性阈值
  thresholds:
    max_bad_block_rate: 0.0001  # 0.01%
    max_ecc_error_rate: 1e-12
    min_life_hours: 20000

# 环境测试配置
environmental_test:
  temperature_range: [-40, 125]
  humidity_range: [10, 95]
  vibration_frequency_range: [10, 2000]
  shock_acceleration_g: 1500

# 日志配置
logging:
  level: "INFO"
  file: "ufs_test.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 报告配置
report:
  generate_html: true
  generate_json: true
  output_dir: "reports"
  include_performance_graphs: true
  include_device_info: true
