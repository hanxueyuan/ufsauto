[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --html=report.html --self-contained-html
timeout = 300
markers =
    functional: 功能测试用例
    performance: 性能测试用例
    reliability: 可靠性测试用例
    ufs31: UFS 3.1 协议测试
    automotive: 车规级测试
